name: Quoin
options:
  bundleIdPrefix: ai.2389
  deploymentTarget:
    macOS: "14.0"

packages:
  QuoinPackages:
    path: ../..
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

schemes:
  Quoin:
    build:
      targets:
        Quoin: all
        QuoinUITests: [test]
    test:
      targets:
        - QuoinUITests

targets:
  QuoinUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests
    dependencies:
      - target: Quoin
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TEST_TARGET_NAME: Quoin

  Quoin:
    type: application
    platform: macOS
    sources:
      - Sources
      - Assets.xcassets
      - path: Resources
        type: folder
        buildPhase: resources
    dependencies:
      - package: QuoinPackages
        product: QuoinCore
      - package: QuoinPackages
        product: QuoinRender
      - package: Sparkle
        product: Sparkle
    entitlements:
      path: Quoin.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        # Sparkle's update check is the app's only network traffic.
        com.apple.security.network.client: true
    info:
      path: Info.plist
      properties:
        CFBundleName: Quoin
        CFBundleDisplayName: Quoin
        # Version/build come from build settings so release builds can stamp
        # them from the git tag (see .github/workflows/release.yml). Defaults
        # for local/dev builds live in settings.base below.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 2389 Research · Chicago, Illinois"
        # Sparkle auto-update (see docs/reference/distribution.md).
        #   • SUFeedURL   → appcast.xml on GitHub Releases, regenerated per release.
        #   • SUPublicEDKey → Quoin's EdDSA public key (keychain account "Quoin";
        #     the private half signs the appcast and never enters the repo).
        SUFeedURL: "https://github.com/2389-research/Quoin/releases/latest/download/appcast.xml"
        SUPublicEDKey: "NubwOPB+LzCQeeUvWk5hCiOvZuNmQj1BIcjn7tGi+kY="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        # Sandboxed apps must let Sparkle launch its installer via XPC.
        SUEnableInstallerLauncherService: true
        # quoin:// deep links (issue #31). The action is the URL host and the
        # target is the `path` query item, resolved against — and confined to —
        # the sandboxed library root (QuoinURLScheme). Registering the scheme
        # here is what makes LaunchServices route quoin:// URLs to the app via
        # application(_:open:).
        CFBundleURLTypes:
          - CFBundleURLName: ai.2389.Quoin.deeplink
            CFBundleTypeRole: Viewer
            CFBundleURLSchemes:
              - quoin
        # Handoff / current-activity (issue #36). The open document is published
        # as an NSUserActivity of this type; its userInfo carries a quoin://
        # deep link (never an absolute path or bookmark), re-resolved through
        # QuoinURLScheme on the receiving side so the sandbox boundary holds.
        # Declaring the type here is what makes the activity eligible for
        # Handoff and application(_:continue:) delivery.
        NSUserActivityTypes:
          - ai.2389.Quoin.editing
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
          - CFBundleTypeName: Plain Text Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Dev-build defaults; release builds override via xcodebuild
        # (MARKETING_VERSION from the tag, CURRENT_PROJECT_VERSION from the
        # commit count — Sparkle compares CFBundleVersion, so it must grow).
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
