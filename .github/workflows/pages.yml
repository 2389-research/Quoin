name: Pages

# Builds the Hugo site in site/ and deploys it to GitHub Pages. The Pages
# site is configured for workflow deploys (build_type=workflow), replacing
# the old legacy build of main:/docs. docs/{images,media,brand} are mounted
# into the site as static assets (see site/hugo.toml), so asset URLs are
# unchanged from the old deployment — which is why changes to those
# directories also trigger a deploy.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/images/**"
      - "docs/media/**"
      - "docs/brand/**"
      - ".github/workflows/pages.yml"
  # A new release refreshes the site's version highlight + "What's new".
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; never cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Keep in step with the Hugo version used for local `hugo --source site`.
      HUGO_VERSION: "0.164.0"
    steps:
      - uses: actions/checkout@v7

      - name: Install Hugo
        run: |
          wget -q -O "$RUNNER_TEMP/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "$RUNNER_TEMP/hugo.deb"

      # Keep the homepage's version highlight + "What's new" in step with the
      # published Latest release. Overwrites the committed seed in
      # site/data/release.json; on failure the seed is kept so a build never
      # breaks on a transient API hiccup.
      - name: Latest release → Hugo data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/releases/latest" \
               --jq '{tag: .tag_name, name: .name, date: .published_at, url: .html_url, body: .body}' \
               > "$RUNNER_TEMP/release.json" && [ -s "$RUNNER_TEMP/release.json" ]; then
            cp "$RUNNER_TEMP/release.json" site/data/release.json
            echo "Synced site/data/release.json to $(jq -r .tag site/data/release.json)"
          else
            echo "release fetch failed — keeping committed site/data/release.json"
          fi

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      # base_url comes from the Pages config, so a rename or custom domain
      # doesn't require touching site/hugo.toml.
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo --source site --minify --gc \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
